events {}

http {
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    geo $ru_ip {
        default 0;

        include /etc/nginx/ru_ip.txt;
    }
    server {
        listen 80;
        server_name localhost;

        location = /stub {
            default_type text/html;
            return 200 '<h1>ВАМ СЮДА НЕЛЬЗЯ</h1>';
        }

        location / {
            if ($ru_ip){
                return 302 /stub;
            }

            proxy_pass http://app:8081;
        }
    }
}
